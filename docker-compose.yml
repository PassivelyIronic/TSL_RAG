version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tsl_rag_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: tsl_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tsl_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
